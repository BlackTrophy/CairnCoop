name: Build & Release

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '6.0.x'
  PROJECT_FILE:   'CairnCoop.csproj'

jobs:
  # ================================================================
  #  BUILD WITH STUBS (no game files needed in CI)
  # ================================================================
  build:
    name: Build (Stub Mode)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_FILE }} -p:UseStubs=true

      - name: Build (Stub mode — no game DLLs)
        run: |
          dotnet build ${{ env.PROJECT_FILE }} `
            -c Release `
            -p:UseStubs=true `
            -p:CairnPath="${{ github.workspace }}/stubs" `
            --nologo
        # Note: stub mode replaces game DLL references with type stubs
        # The actual playable DLL must be built locally with real game files.

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CairnCoop-stub-${{ github.sha }}
          path: bin/Release/CairnCoop.dll
          if-no-files-found: warn

  # ================================================================
  #  LINT / FORMAT CHECK
  # ================================================================
  lint:
    name: Format Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check formatting
        run: dotnet format ${{ env.PROJECT_FILE }} --verify-no-changes -p:UseStubs=true
        continue-on-error: true   # Don't fail CI on format issues yet

  # ================================================================
  #  RELEASE (nur auf Tags)
  # ================================================================
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: CairnCoop-stub-${{ github.sha }}
          path: release/

      - name: Package installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "CairnCoop_${tag}_installer.zip"

          # Installer + DLL + README in ein Zip packen
          Compress-Archive -Path @(
            "installer\Setup.bat",
            "installer\Uninstall.bat",
            "installer\CairnCoopSetup.ps1",
            "release\CairnCoop.dll",
            "README.md"
          ) -DestinationPath $zipName

          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (Test-Path "CHANGELOG.md") {
            $content = Get-Content "CHANGELOG.md" -Raw
            # Extract section for this tag
            $pattern = "(?s)## \[$tag\].*?(?=## \[|$)"
            $match = [regex]::Match($content, $pattern)
            $notes = if ($match.Success) { $match.Value } else { "Keine Changelogs gefunden." }
          } else {
            $notes = "Initiales Release."
          }
          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ github.ref_name }}
          name:        "CairnCoop ${{ github.ref_name }}"
          body:        ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft:       false
          prerelease:  ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files:       ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
